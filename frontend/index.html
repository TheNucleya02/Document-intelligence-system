<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocIntel - AI Document Assistant</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">

<div class="container-fluid h-100 d-flex flex-column py-3">
    <!-- Header -->
    <header class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
        <h1 class="h3 mb-0 fw-bold text-primary"><i class="bi bi-file-earmark-text-fill me-2"></i>DocIntel</h1>
        <div class="d-flex gap-2">
            <button id="clear-db-btn" class="btn btn-outline-danger btn-sm">Clear Documents</button>
            <button id="clear-history-btn" class="btn btn-outline-warning btn-sm">Clear History</button>
        </div>
    </header>

    <div class="row flex-grow-1 overflow-hidden">
        <!-- Sidebar: Upload & Settings -->
        <div class="col-md-4 col-lg-3 d-flex flex-column h-100 mb-3 mb-md-0">
            <div class="card shadow-sm mb-3">
                <div class="card-body">
                    <h5 class="card-title fw-bold">Upload Document</h5>
                    <form id="upload-form">
                        <div class="mb-3">
                            <input class="form-control" type="file" id="pdf-file" accept="application/pdf" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="upload-btn">
                            <i class="bi bi-cloud-upload me-2"></i>Upload & Process
                        </button>
                    </form>
                    <div id="upload-status" class="mt-2 small text-muted"></div>
                </div>
            </div>

            <div class="card shadow-sm flex-grow-1 overflow-hidden d-flex flex-column">
                <div class="card-body d-flex flex-column p-0">
                    <div class="p-3 border-bottom">
                        <h5 class="card-title fw-bold mb-0">History</h5>
                    </div>
                    <div id="history-container" class="p-3 overflow-y-auto flex-grow-1">
                        <!-- History items will be injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="col-md-8 col-lg-9 d-flex flex-column h-100">
            <div class="card shadow-sm flex-grow-1 d-flex flex-column overflow-hidden mb-3">
                <!-- Chat Window -->
                <div id="chat-window" class="card-body overflow-y-auto flex-grow-1 p-4 bg-white">
                    <div class="text-center text-muted my-5" id="empty-chat-msg">
                        <i class="bi bi-chat-square-text fs-1"></i>
                        <p class="mt-2">Upload a document and start asking questions!</p>
                    </div>
                    <!-- Messages will be injected here -->
                </div>
                
                <!-- Input Area -->
                <div class="card-footer bg-light p-3 border-top">
                    <form id="query-form" class="d-flex gap-2">
                        <div class="form-check form-switch d-flex align-items-center gap-2 mb-0">
                            <input class="form-check-input" type="checkbox" id="stream-toggle" checked>
                            <label class="form-check-label small" for="stream-toggle">Stream</label>
                        </div>
                        <div class="input-group">
                            <input type="text" id="query-input" class="form-control rounded-pill-start" placeholder="Ask a question about your documents..." required>
                            <button class="btn btn-primary rounded-pill-end px-4" type="submit" id="send-btn">
                                <i class="bi bi-send-fill"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Source Modal -->
<div class="modal fade" id="sourceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">Document Sources</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="source-modal-body">
                <!-- Source content goes here -->
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Marked.js for Markdown parsing -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
